global:
  namespaceOverride: kubeai
loki:
  enabled: true
  config:
    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks
    chunk_store_config:
      max_look_back_period: 0s
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 3100
promtail:
  enabled: true
  config:
    snippets:
      pipelineStages:
        - json:
            expressions:
              level: level
              service: ServiceName
              time: TimeFormat
        - timestamp:
            source: time
            format: "2006-01-02T15:04:05.000Z07:00"
    scrape_configs:
      - job_name: kubeai-logs
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [kubeai]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod