apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gateway
  namespace: kubeai
  labels:
    app: inference-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-gateway
  template:
    metadata:
      labels:
        app: inference-gateway
    spec:
      serviceAccountName: inferenceservice-controller-sa
      containers:
        - name: inference-gateway
          image: docker.io/lg-discovery/kubeai-inference-gateway:v1.0.0 # 需替换为真实的 inference-gateway 镜像
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 58082
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_USER
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: REDIS_USER
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /app/etc
              readOnly: true
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 58082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 58082
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: kubeai-config
            items:
              - key: inference-gateway.yaml
                path: inference-gateway.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: inference-gateway
  namespace: kubeai
spec:
  selector:
    app: inference-gateway
  ports:
    - port: 58082
      targetPort: 58082
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inferenceservice-controller-sa
  namespace: kubeai
  labels:
    app: inference-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inferenceservice-controller-role
rules:
   # 自定义资源：InferenceService & TrainingJob
  - apiGroups: ["kubeai.platform.io"]
    resources: ["inferenceservices","trainingjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # 自定义资源：Status 子资源
  - apiGroups: ["kubeai.platform.io"]
    resources: ["inferenceservices/status","trainingjobs/status"]
    verbs: ["get", "update", "patch"]
  # 自定义资源：Finalizers 子资源
  - apiGroups: ["kubeai.platform.io"]
    resources: ["inferenceservices/finalizers","trainingjobs/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["core"]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inferenceservice-controller-binding
subjects:
  - kind: ServiceAccount
    name: inferenceservice-controller-sa  # 服务运行的 ServiceAccount
    namespace: kubeai
roleRef:
  kind: ClusterRole
  name: inferenceservice-controller-role
  apiGroup: rbac.authorization.k8s.io