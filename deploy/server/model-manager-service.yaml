apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-manager
  namespace: kubeai
  labels:
    app: model-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-manager
  template:
    metadata:
      labels:
        app: model-manager
    spec:
      containers:
        - name: model-manager
          image: docker.io/lg-discovery/kubeai-model-manager:v1.0.0 # 需替换为真实的 model-manager 镜像
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 58080
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: POSTGRES_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeai-secrets
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: config
              mountPath: /app/etc
              readOnly: true
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/models/metrics
              port: 58080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/models/metrics
              port: 58080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: kubeai-config
            items:
              - key: model-manager.yaml
                path: model-manager.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: model-manager
  namespace: kubeai
spec:
  selector:
    app: model-manager
  ports:
    - port: 58080
      targetPort: 58080
  type: ClusterIP