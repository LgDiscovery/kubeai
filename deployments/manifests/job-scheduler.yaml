apiVersion: v1
kind: Service
metadata:
  name: job-scheduler
  namespace: kubeai
  labels:
    app: kubeai-job-scheduler
spec:
  type: ClusterIP
  ports:
    - port: 58081
      targetPort: 58081
      protocol: TCP
      name: http
  selector:
    app: kubeai-job-scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scheduler
  namespace: kubeai
  labels:
    app: job-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeai-job-scheduler
  template:
    metadata:
      labels:
        app: kubeai-job-scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "58081"
        prometheus.io/scheme: "http"
        prometheus.io/path: "/api/v1/jobs/metrics"
    spec:
      containers:
        - name: job-scheduler
          image: docker.io/your-registry/kubeai-job-scheduler:v1.0.0
          ports:
            - containerPort: 58081
          env:
            - name: DB_HOST
              value: "postgres.kubeai.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_NAME
              value: "kubeai_platform"
            - name: MINIO_ENDPOINT
              value: "minio.kubeai.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
            - name: MINIO_BUCKET
              value: "models"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/jobs/health
              port: 58081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/jobs/ready
              port: 58081
            initialDelaySeconds: 5
            periodSeconds: 10