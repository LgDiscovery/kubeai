apiVersion: v1
kind: Service
metadata:
  name: model-manager
  namespace: kubeai
  labels:
    app: kubeai-model-manager
spec:
  type: ClusterIP
  ports:
    - port: 58080
      targetPort: 58080
      protocol: TCP
      name: http
  selector:
    app: kubeai-model-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-manager
  namespace: kubeai
  labels:
    app: model-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeai-model-manager
  template:
    metadata:
      labels:
        app: kubeai-model-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "58080"
        prometheus.io/scheme: "http"
        prometheus.io/path: "/api/v1/models/metrics"
    spec:
      containers:
        - name: model-manager
          image: docker.io/your-registry/kubeai-model-manager:v1.0.0
          ports:
            - containerPort: 58080
          env:
          - name: DB_HOST
            value: "postgres.kubeai.svc.cluster.local"
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            value: "postgres"
          - name: DB_PASSWORD
            value: "postgres"
          - name: DB_NAME
            value: "kubeai_platform"
          - name: MINIO_ENDPOINT
            value: "minio.kubeai.svc.cluster.local:9000"
          - name: MINIO_ACCESS_KEY
            value: "minioadmin"
          - name: MINIO_SECRET_KEY
            value: "minioadmin"
          - name: MINIO_BUCKET
            value: "models"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/models/health
              port: 58080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/models/ready
              port: 58080
            initialDelaySeconds: 5
            periodSeconds: 10