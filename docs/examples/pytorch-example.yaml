apiVersion: ai.platform.io/v1
kind: TrainingJob
metadata:
  name: bert-finetune
  namespace: kubeai
spec:
  framework: pytorch
  replicaSpecs:
    Master:
      replicas: 1
      template:
        spec:
          containers:
            - name: pytorch
              image: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
              command: ["torchrun"]
              args:
                - "--nnodes=2"
                - "--nproc_per_node=1"
                - "--rdzv_backend=c10d"
                - "--rdzv_endpoint=$(MASTER_ADDR):$(MASTER_PORT)"
                - "/app/train.py"
              resources:
                limits:
                  nvidia.com/gpu: 1
    Worker:
      replicas: 3
      template:
        spec:
          containers:
            - name: pytorch
              image: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
              command: ["torchrun"]
              args:
                - "--nnodes=2"
                - "--nproc_per_node=1"
                - "--rdzv_backend=c10d"
                - "--rdzv_endpoint=$(MASTER_ADDR):$(MASTER_PORT)"
                - "/app/train.py"
              resources:
                limits:
                  nvidia.com/gpu: 1
  runPolicy:
    cleanPodPolicy: All
    backoffLimit: 3
  datasetRef:
    name: "imdb-dataset"
    path: "s3://datasets/imdb"
  outputPath: "s3://models/bert-finetuned"